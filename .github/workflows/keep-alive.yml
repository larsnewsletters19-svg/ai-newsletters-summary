- name: Test Basic Connectivity
        run: |
          echo "Testing DNS resolution..."
          nslookup uwvehsingptdtvpraewx.supabase.co || echo "DNS failed"
          
          echo "Testing ping..."
          ping -c 2 uwvehsingptdtvpraewx.supabase.co || echo "Ping failed"

          echo "Testing basic curl..."
          curl -v https://uwvehsingptdtvpraewx.supabase.co || echo "Curl failed"
      
      - name: Test with Secret
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "URL length: ${#SUPABASE_URL}"
          echo "First 8 chars: ${SUPABASE_URL:0:8}"
          
          curl -v "${SUPABASE_URL}/rest/v1/youtube_videos?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"
