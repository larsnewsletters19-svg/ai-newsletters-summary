name: Keep Railway & Supabase Alive

on:
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "=== DEBUG SECRETS ==="
          echo "URL length: ${#SUPABASE_URL}"
          echo "URL first 30 chars: ${SUPABASE_URL:0:30}"
          echo "URL last 20 chars: ${SUPABASE_URL: -20}"
          echo ""
          echo "KEY length: ${#SUPABASE_KEY}"
          echo "KEY first 20 chars: ${SUPABASE_KEY:0:20}"
          echo "KEY last 10 chars: ${SUPABASE_KEY: -10}"
          echo ""
          echo "Expected URL: https://zcdjwtyxehfrkyhnpekq.supabase.co"
          echo "Expected length: 47"
      
      - name: Try Actual Request
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Testing actual request..."
          curl -v "${SUPABASE_URL}/rest/v1/youtube_videos?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"
