- name: Ping Supabase Directly
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🏓 Pinging Supabase directly..."
          
          # Debug - visa längd på secrets (inte innehållet)
          echo "URL length: ${#SUPABASE_URL}"
          echo "Key length: ${#SUPABASE_KEY}"
          
          # Testa anslutningen
          response=$(curl -v -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/youtube_videos?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" 2>&1)
          
          http_code=$(echo "$response" | tail -n1)
          
          echo "📡 Full response:"
          echo "$response"
          echo ""
          echo "📡 HTTP code: $http_code"
