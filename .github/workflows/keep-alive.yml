name: Keep Railway & Supabase Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Railway Backend
        run: |
          echo "🏓 Pinging Railway..."
          response=$(curl -s -w "\n%{http_code}" https://ai-newsletters-summary-production.up.railway.app/health)
          http_code=$(echo "$response" | tail -n1)
          echo "📡 Railway: $http_code"
          if [ "$http_code" != "200" ]; then exit 1; fi
          echo "✅ Railway alive!"
      
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🏓 Pinging Supabase..."
          response=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/youtube_videos?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          http_code=$(echo "$response" | tail -n1)
          echo "📡 Supabase: $http_code"
          if [ "$http_code" != "200" ]; then exit 1; fi
          echo "✅ Supabase alive!"
